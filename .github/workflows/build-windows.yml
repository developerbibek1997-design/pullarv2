name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'pullar lite/**'
      - '.github/workflows/build-windows.yml'

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: 'pullar lite'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller==6.12.0 pyzk==0.9 requests==2.32.3 pillow==11.1.0

      - name: Build onefile EXE
        run: >
          pyinstaller --noconfirm --clean --onefile --windowed
          --name Puller --icon icon.ico
          --add-data "images;images"
          main.py

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: Puller-windows-exe
          path: 'pullar lite/dist/Puller.exe'
          if-no-files-found: error
